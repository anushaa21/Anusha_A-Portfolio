<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* SKILLS SECTION */
.skills-section{
    width:100%;
    padding:80px 10%;
    background:linear-gradient(to right,#141e30,#243b55);
}

.skills-title{
    text-align:center;
    color:white;
    font-size:45px;
    margin-bottom:50px;
}

.skills-wrapper{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:30px;
}

.skill-box{
    background:white;
    padding:30px;
    border-radius:20px;
    text-align:center;
    transition:0.4s;
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.skill-box:hover{
    transform:translateY(-10px) scale(1.03);
}

.icon{
    font-size:50px;
    margin-bottom:15px;
}

.skill-box h3{
    color:#2874f0;
    margin-bottom:15px;
}

.skill-box p{
    color:#555;
    margin-top:15px;
    line-height:1.6;
}

/* SKILL BAR */
.skill-bar{
    width:100%;
    height:12px;
    background:#ddd;
    border-radius:20px;
    overflow:hidden;
}

.skill-fill{
    height:100%;
    color:white;
    font-size:12px;
    text-align:right;
    padding-right:10px;
    line-height:12px;
    border-radius:20px;
}

.html{
    width:90%;
    background:linear-gradient(to right,#ff512f,#dd2476);
}

.java{
    width:85%;
    background:linear-gradient(to right,#11998e,#38ef7d);
}

.sql{
    width:80%;
    background:linear-gradient(to right,#396afc,#2948ff);
}

.cloud{
    width:70%;
    background:linear-gradient(to right,#f7971e,#ffd200);
}

    </style>
</head>
<body>
    <!-- SKILLS SECTION -->
<section class="skills-section" id="skills">

    <h1 class="skills-title">My Skills</h1>

    <div class="skills-wrapper">

        <div class="skill-box">
            <div class="icon">💻</div>
            <h3>Frontend</h3>

            <div class="skill-bar">
                <div class="skill-fill html">90%</div>
            </div>

            <p>HTML, CSS, JavaScript, Bootstrap, React</p>
        </div>

        <div class="skill-box">
            <div class="icon">☕</div>
            <h3>Java Development</h3>

            <div class="skill-bar">
                <div class="skill-fill java">85%</div>
            </div>

            <p>Java, JDBC, Servlet, JSP, Spring Boot</p>
        </div>

        <div class="skill-box">
            <div class="icon">🗄️</div>
            <h3>Database</h3>

            <div class="skill-bar">
                <div class="skill-fill sql">80%</div>
            </div>

            <p>MySQL, SQL Queries, Database Connectivity</p>
        </div>

        <div class="skill-box">
            <div class="icon">☁️</div>
            <h3>Cloud & DevOps</h3>

            <div class="skill-bar">
                <div class="skill-fill cloud">70%</div>
            </div>

            <p>AWS Basics, GitHub, Cloud Concepts</p>
        </div>

    </div>

</section>
</body>
</html>
